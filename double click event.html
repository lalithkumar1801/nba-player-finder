<!DOCTYPE html>
<html>
    <body>

        <h1 id="demo">Click Me Twice</h1>
        <button ondblclick="changeText()">
            Double Click Me
        </button>

        <script>
            function changeText() {
                document.getElementById("demo").innerHTML="DOM Events Are Easy";
            }
        </script>
    

        
    
    </body>
</html>
