<!DOCTYPE html>
<html>
    <head>
        <style>

        body {
            background-color: lightyellow;
        }
        .title {
            color: maroon;
            font-size: 40px;
            text-align: center;
        }
        #namebox {
            font-size: 20px;
            padding: 10px;

        }
        button {
            font-size: 18px;
            padding: 10px;
        }
        #demo {
            color: green; 
            
        }
        </style>
    </head>

    <body>
        <h1 class="title">NBA Player Finder</h1>
        <input type="text" id="namebox">
        <button onclick="ShowPlayer()">Find Player</button>
        <h1 id="demo"></h1>

        <script>

        let players= [
            {
                name: "Curry",
                team: "Warriors"
            },
            {
                name: "Wemby",
                team: "Spurs"
            },
            {
                name: "Fox",
                team: "Kings"
            }
        ]

        function ShowPlayer() {
            let name= document.getElementById("namebox").value;
            let found= false;

            for(let i=0; i<players.length; i++) {
                if(name == players[i].name) {
                    document.getElementById("demo").innerHTML= players[i].name+ " plays for " + players[i].team;
                    found= true;
                }
            }

            if(found == false) {
                document.getElementById("demo").innerHTML = "Player Not Found";
                
            }
        }
        </script>
    </body>
    



</html>
