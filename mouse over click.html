<!DOCTYPE html>
<html>
    <body>

        <h1 onmouseover="changeColor()" id="demo">
            Hover Over Me
        </h1>

        <script>
            function changeColor() {
                document.getElementById("demo").innerHTML="I changed color!";
                document.getElementById("demo").style.color="Red";
            }
        </script>
    </body>
</html>
