<!DOCTYPE html>
<html>
<body>

<h2>What Can JavaScript Do?</h2>

<p>JavaScript can change HTML attribute values.</p>

<button onclick="document.getElementById('myImage').src='pic_bulbon.gif.png'">
Turn on the light
</button>

<img id="myImage" src="pic_bulboff.gif.png" style="width:100px">

<button onclick="document.getElementById('myImage').src='pic_bulboff.gif.png'">
Turn off the light
</button>

</body>
</html>
